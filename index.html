function buildOverviewCharts(td){
  ['ov_pu','ov_wub','ov_gmv','ov_pur'].forEach(k=>{if(charts[k]){charts[k].destroy();delete charts[k];}});
  const metrics=['pi','wi','gi','pur'];
  const canvasIds=['ov_pu','ov_wub','ov_gmv','ov_pur'];
  canvasIds.forEach((cid,mi)=>{
    const ctx=document.getElementById(cid);
    if(!ctx)return;
    const datasets=[];
    for(const r of ['KR','GW']){
      const rd=td.regions[r]; if(!rd)continue;
      const allPts=[...rd.pre,...rd.post].sort((a,b)=>a.w-b.w);
      datasets.push({label:r,data:allPts.map(p=>({x:p.w,y:p[metrics[mi]]})),borderColor:COLORS[r],borderWidth:2.5,pointRadius:2,tension:0.3,fill:false});
    }
    const refLine=mi<3?100:null;
    charts[cid]=new Chart(ctx,{
      type:'line',data:{datasets},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top',labels:{color:'#8899aa',font:{size:11},usePointStyle:true}},
          tooltip:{callbacks:{label:function(c){const v=c.parsed.y;return c.dataset.label+': '+(metrics[mi]==='pur'?v.toFixed(1)+'%':v.toFixed(0));}}}},
        scales:{x:{type:'linear',title:{display:true,text:'주차 (0=복귀)',color:'#6b8299',font:{size:10}},grid:{color:'#1e2e3e'},ticks:{color:'#6b8299'}},
          y:{grid:{color:'#1e2e3e'},ticks:{color:'#6b8299'}}}
      },
      plugins:[{id:'ref',afterDraw(chart){if(!refLine)return;const ya=chart.scales.y;const xa=chart.scales.x;const y=ya.getPixelForValue(refLine);if(y<ya.top||y>ya.bottom)return;const c2=chart.ctx;c2.save();c2.beginPath();c2.setLineDash([6,4]);c2.strokeStyle='#ffffff44';c2.lineWidth=1;c2.moveTo(xa.left,y);c2.lineTo(xa.right,y);c2.stroke();c2.restore();}}]
    });
  });
}

function buildOverviewTable(td){
  const el=document.getElementById('ov_tbl');
  if(!el)return;
  const regions=REGION_ORDER.filter(r=>td.regions[r]);
  let h='<table class="tbl"><tr><th>지역</th><th>휴재전 PU</th><th>현재 PU</th><th>PU 변화</th><th>휴재전 WUB</th><th>현재 WUB</th><th>WUB 변화</th><th>휴재전 GMV</th><th>현재 GMV</th><th>GMV 변화</th><th>전 PUR</th><th>현 PUR</th></tr>';
  for(const r of regions){
    const rd=td.regions[r];
    const last=rd.post[rd.post.length-1];
    if(!last)continue;
    const puC=last.pi-100;
    const wubC=last.wi-100;
    const gmvC=last.gi-100;
    const prePur=rd.pre.length>0?(rd.pre.reduce((a,b)=>a+b.pur,0)/rd.pre.length):0;
    const cls=puC>=10?'pos':puC<=-10?'neg':'neu';
    const bold=(r==='KR'||r==='GW')?'font-weight:700;background:#0d1b2a':'';
    const cur=r==='KR'?'\u20A9':'$';
    const gwNote=r==='GW'?' (평균)':'';
    h+=`<tr style="${bold}"><td><span style="color:${COLORS[r]||'#999'};font-weight:700">${r}${gwNote}</span></td><td>${fmt(rd.avgPu)}</td><td>${fmt(last.pu)}</td><td class="${cls}">${pct(puC)}</td><td>${fmt(rd.avgWub)}</td><td>${fmt(last.wub)}</td><td class="${wubC>=0?'pos':'neg'}">${pct(wubC)}</td><td>${cur}${fmt(rd.avgGmv)}</td><td>${cur}${fmt(last.gmv)}</td><td class="${gmvC>=0?'pos':'neg'}">${pct(gmvC)}</td><td>${prePur.toFixed(1)}%</td><td>${last.pur.toFixed(1)}%</td></tr>`;
  }
  h+='</table>';
  el.innerHTML=h;
}

  const chipsEl=document.getElementById('regionChips');

function setDM(m){detailMode=m;renderDetail();}
function setDMet(m){detailMetric=m;renderDetail();}
function toggleRegion(r){
  if(selectedRegions.includes(r))selectedRegions=selectedRegions.filter(x=>x!==r);
  else selectedRegions.push(r);
  renderDetail();
}

function buildDetailChart(){
  if(charts.dc){charts.dc.destroy();delete charts.dc;}
  const title=TITLES[currentTitle];
  const td=DATA[title];
  const ctx=document.getElementById('dchart');
  if(!ctx)return;
  let mk;
  if(detailMetric==='pur')mk='pur';
  else if(detailMode==='index')mk=detailMetric==='pu'?'pi':detailMetric==='wub'?'wi':'gi';
  else mk=detailMetric;

  const datasets=[];
  for(const r of selectedRegions){
    const rd=td.regions[r];if(!rd)continue;
    const allPts=[...rd.pre,...rd.post].sort((a,b)=>a.w-b.w);
    datasets.push({label:r,data:allPts.map(p=>({x:p.w,y:p[mk]})),borderColor:COLORS[r]||'#999',borderWidth:(r==='KR'||r==='GW')?2.5:1.5,pointRadius:(r==='KR'||r==='GW')?2:1,tension:0.3,fill:false});
  }
  const refLine=(detailMode==='index'&&detailMetric!=='pur')?100:null;
  const yLabel=detailMetric==='pur'?'PUR (%)':(detailMode==='index'?detailMetric.toUpperCase()+' Index (100=휴재전)':detailMetric.toUpperCase());
  document.getElementById('dtitle').textContent=yLabel+' — '+selectedRegions.join(', ');

  charts.dc=new Chart(ctx,{
    type:'line',data:{datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{color:'#8899aa',font:{size:11},usePointStyle:true}},
        tooltip:{callbacks:{label:function(c){const v=c.parsed.y;if(detailMetric==='pur')return c.dataset.label+': '+v.toFixed(1)+'%';if(detailMode==='actual')return c.dataset.label+': '+fmt(v);return c.dataset.label+': '+v.toFixed(0);}}}},
      scales:{x:{type:'linear',title:{display:true,text:'주차 (0=복귀)',color:'#6b8299',font:{size:10}},grid:{color:'#1e2e3e'},ticks:{color:'#6b8299'}},
        y:{grid:{color:'#1e2e3e'},ticks:{color:'#6b8299',callback:function(v){return detailMode==='actual'&&v>=1000?(v>=1000000?(v/1000000).toFixed(1)+'M':(v/1000).toFixed(0)+'K'):v;}}}}
    },
    plugins:[{id:'ref',afterDraw(chart){if(!refLine)return;const ya=chart.scales.y;const xa=chart.scales.x;const y=ya.getPixelForValue(refLine);if(y<ya.top||y>ya.bottom)return;const c2=chart.ctx;c2.save();c2.beginPath();c2.setLineDash([6,4]);c2.strokeStyle='#ffffff44';c2.lineWidth=1;c2.moveTo(xa.left,y);c2.lineTo(xa.right,y);c2.stroke();c2.restore();}}]
  });
}

function buildDetailTable(){
  const el=document.getElementById('dtbl');
  if(!el)return;
  const title=TITLES[currentTitle];
  const td=DATA[title];
  const regs=selectedRegions.filter(r=>td.regions[r]);
  if(regs.length===0){el.innerHTML='<p style="color:#6b8299">지역을 선택하세요</p>';return;}
  const weeksSet=new Set();
  for(const r of regs){const rd=td.regions[r];[...rd.pre,...rd.post].forEach(p=>weeksSet.add(p.w));}
  const weeks=[...weeksSet].sort((a,b)=>a-b);
  let mk;
  if(detailMetric==='pur')mk='pur';
  else if(detailMode==='index')mk=detailMetric==='pu'?'pi':detailMetric==='wub'?'wi':'gi';
  else mk=detailMetric;

  let h='<table class="tbl"><tr><th>주차</th>';
  for(const r of regs)h+=`<th style="color:${COLORS[r]||'#999'}">${r}</th>`;
  h+='</tr>';
  for(const w of weeks){
    h+=`<tr style="${w>=0?'':'opacity:0.6'}"><td>${w>=0?'W+'+w:'W'+w}</td>`;
    for(const r of regs){
      const rd=td.regions[r];const allPts=[...rd.pre,...rd.post];const p=allPts.find(x=>x.w===w);
      if(p){const v=p[mk];const d=detailMetric==='pur'?v.toFixed(1)+'%':(detailMode==='actual'?fmt(v):String(v));h+=`<td>${d}</td>`;}
      else h+='<td>-</td>';
    }
    h+='</tr>';
  }
  h+='</table>';
  el.innerHTML=h;
}

render();

// ========== TIMELINE ==========
let tlMetric='pu';
let tlMode='actual';
let tlRegions=['KR','GW'];
function renderTimeline(){
  const el=document.getElementById('view-timeline');
  const title=FULL_TITLES[currentTitle];
  const td=FULL[title];
  if(!td){el.innerHTML='<p>데이터 없음</p>';return;}
  const regions=Object.keys(td.regions);

  el.innerHTML=`
  <div class="toolbar">
    <span>모드:</span>
    <button class="btn ${tlMode==='actual'?'active':''}" onclick="setTlMode('actual')">📈 실수치</button>
    <button class="btn ${tlMode==='index'?'active':''}" onclick="setTlMode('index')">📊 인덱스 (복귀전=100)</button>
    <span style="margin-left:16px">지표:</span>
    <button class="btn ${tlMetric==='pu'?'active':''}" onclick="setTlMet('pu')">PU</button>
    <button class="btn ${tlMetric==='wub'?'active':''}" onclick="setTlMet('wub')">WUB</button>
    <button class="btn ${tlMetric==='gmv'?'active':''}" onclick="setTlMet('gmv')">GMV</button>
    <button class="btn ${tlMetric==='pur'?'active':''}" onclick="setTlMet('pur')">PUR</button>
  </div>
  <div class="detail-controls">
    <span style="font-size:11px;color:#6b8299">지역:</span>
    <div class="region-chips" id="tlChips"></div>
  </div>
  <div class="grid2"><div class="cbox full"><h3 id="tl_title">전체 타임라인</h3><canvas id="tl_chart" style="max-height:400px"></canvas>
  <div class="note">${tlMode==='index'?'인덱스 100 = 복귀 전(휴재 제외) 활성주 평균 | ':''}빨간 점선 = 복귀일 (${td.ret}) | 런칭 이후 전체 주간 데이터</div></div></div>
  <div class="grid2"><div class="cbox full"><h3>📋 주간 데이터</h3><div id="tl_tbl" style="max-height:400px;overflow-y:auto"></div></div></div>
  `;

  const chipsEl=document.getElementById('tlChips');
  for(const r of regions){
    const chip=document.createElement('div');
    chip.className='chip'+(tlRegions.includes(r)?' active':'');
    chip.textContent=r;
    chip.style.borderLeft='3px solid '+(COLORS[r]||'#666');
    chip.onclick=()=>{
      if(tlRegions.includes(r))tlRegions=tlRegions.filter(x=>x!==r);
      else tlRegions.push(r);
      renderTimeline();
    };
    chipsEl.appendChild(chip);
  }
  buildTlChart(title,td);
  buildTlTable(title,td);
}

function setTlMet(m){tlMetric=m;renderTimeline();}
function setTlMode(m){tlMode=m;renderTimeline();}

// Calculate pre-return avg (excluding hiatus weeks) for each region
function getPreAvg(rd, retDt, metric){
  const preData = rd.filter(p => p.d < retDt);
  if(preData.length === 0) return 1;
  const vals = preData.map(p => p[metric]).filter(v => v > 0);
  if(vals.length === 0) return 1;
  // Exclude hiatus: remove weeks where value < 30% of median
  vals.sort((a,b) => a-b);
  const med = vals[Math.floor(vals.length/2)];
  const active = vals.filter(v => v >= med * 0.3);
  return active.length > 0 ? active.reduce((a,b) => a+b, 0) / active.length : 1;
}

function buildTlChart(title,td){
  if(charts.tl){charts.tl.destroy();delete charts.tl;}
  const ctx=document.getElementById('tl_chart');
  if(!ctx)return;
  const datasets=[];
  const retDt = td.ret;
  for(const r of tlRegions){
    const rd=td.regions[r];
    if(!rd)continue;
    let chartData;
    if(tlMode==='index' && tlMetric!=='pur'){
      const avg = getPreAvg(rd, retDt, tlMetric);
      chartData = rd.map(p => ({x:p.d, y: Math.round(p[tlMetric]/avg*100)}));
    } else {
      chartData = rd.map(p => ({x:p.d, y:p[tlMetric]}));
    }
    datasets.push({
      label:r,
      data:chartData,
      borderColor:COLORS[r]||'#999',
      borderWidth:r==='KR'?2.5:1.5,
      pointRadius:0,
      tension:0.3,
      fill:false,
    });
  }
  const yLabel=tlMetric==='pur'?'PUR (%)':(tlMode==='index'?tlMetric.toUpperCase()+' Index (100=복귀전 평균)':tlMetric.toUpperCase());
  document.getElementById('tl_title').textContent=title+' — '+yLabel+' ('+tlRegions.join(', ')+')';

  const refLine = (tlMode==='index' && tlMetric!=='pur') ? 100 : null;
  charts.tl=new Chart(ctx,{
    type:'line',data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{color:'#8899aa',font:{size:11},usePointStyle:true}},
        tooltip:{callbacks:{label:function(c){const v=c.parsed.y;return c.dataset.label+': '+(tlMetric==='pur'?v.toFixed(1)+'%':(tlMode==='index'?v:fmt(v)));}}}},
      scales:{
        x:{type:'category',grid:{color:'#1e2e3e'},ticks:{color:'#6b8299',font:{size:9},maxTicksLimit:20,maxRotation:45}},
        y:{grid:{color:'#1e2e3e'},ticks:{color:'#6b8299',callback:function(v){if(tlMode==='actual'&&v>=1000)return v>=1000000?(v/1000000).toFixed(1)+'M':(v/1000).toFixed(0)+'K';return v;}}}
      }
    },
    plugins:[{
      id:'retLine',
      afterDraw(chart){
        const xAxis=chart.scales.x;
        const labels=chart.data.datasets[0]?chart.data.datasets[0].data.map(d=>d.x):[];
        const idx=labels.indexOf(retDt);
        if(idx<0)return;
        const x=xAxis.getPixelForValue(idx);
        const ya=chart.scales.y;
        const c2=chart.ctx;
        c2.save();
        c2.beginPath();
        c2.setLineDash([6,4]);
        c2.strokeStyle='#f4433688';
        c2.lineWidth=2;
        c2.moveTo(x,ya.top);
        c2.lineTo(x,ya.bottom);
        c2.stroke();
        c2.fillStyle='#f44336';
        c2.font='10px sans-serif';
        c2.fillText('복귀',x+4,ya.top+12);
        c2.restore();
      }
    },{
      id:'refLineH',
      afterDraw(chart){
        if(!refLine)return;
        const ya=chart.scales.y;const xa=chart.scales.x;
        const y=ya.getPixelForValue(refLine);
        if(y<ya.top||y>ya.bottom)return;
        const c2=chart.ctx;c2.save();c2.beginPath();c2.setLineDash([6,4]);
        c2.strokeStyle='#ffffff44';c2.lineWidth=1;c2.moveTo(xa.left,y);c2.lineTo(xa.right,y);c2.stroke();c2.restore();
      }
    }]
  });
}

function buildTlTable(title,td){
  const el=document.getElementById('tl_tbl');
  if(!el)return;
  const regs=tlRegions.filter(r=>td.regions[r]);
  if(regs.length===0){el.innerHTML='<p style="color:#6b8299">지역을 선택하세요</p>';return;}
  const retDt=td.ret;
  
  // Collect all dates (union)
  const datesSet=new Set();
  for(const r of regs){td.regions[r].forEach(p=>datesSet.add(p.d));}
  const dates=[...datesSet].sort();
  
  // Show last 30 weeks + mark pre/post
  const show = dates.slice(-40);
  
  let h='<table class="tbl"><tr><th>날짜</th>';
  for(const r of regs){
    if(tlMode==='index'&&tlMetric!=='pur') h+=`<th style="color:${COLORS[r]||'#999'}">${r} (idx)</th>`;
    else h+=`<th style="color:${COLORS[r]||'#999'}">${r}</th>`;
  }
  h+='</tr>';
  
  // Pre-avgs for index mode
  const avgs={};
  if(tlMode==='index'&&tlMetric!=='pur'){
    for(const r of regs){
      avgs[r]=getPreAvg(td.regions[r],retDt,tlMetric);
    }
  }
  
  for(const d of show){
    const isPost=d>=retDt;
    h+=`<tr style="${isPost?'':'opacity:0.7'}">`;
    h+=`<td>${d}${isPost?' ✦':''}</td>`;
    for(const r of regs){
      const rd=td.regions[r];
      const p=rd.find(x=>x.d===d);
      if(p){
        let val;
        if(tlMetric==='pur') val=p.pur.toFixed(1)+'%';
        else if(tlMode==='index') val=Math.round(p[tlMetric]/avgs[r]*100);
        else val=fmt(p[tlMetric]);
        h+=`<td>${val}</td>`;
      } else h+='<td>-</td>';
    }
    h+='</tr>';
  }
  h+='</table>';
  if(dates.length>40) h+='<div class="note">최근 40주 표시 중 (전체 '+dates.length+'주) | ✦ = 복귀 후</div>';
  el.innerHTML=h;
}
</script>
